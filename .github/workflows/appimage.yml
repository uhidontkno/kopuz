name: AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  appimage:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libopus-dev libasound2-dev libxdo-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libsoup-3.0-dev libssl-dev \
            libglib2.0-dev libpango1.0-dev \
            libcairo2-dev libgdk-pixbuf-2.0-dev \
            libfuse2 nodejs npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --locked

      - name: Install Node deps
        run: npm install

      - name: Build CSS
        run: npx @tailwindcss/cli -i ./tailwind.css -o ./kopuz/assets/tailwind.css --content './kopuz/**/*.rs,./components/**/*.rs,./pages/**/*.rs,./hooks/**/*.rs,./player/**/*.rs,./reader/**/*.rs'

      - name: Build binary
        run: dx build --package kopuz --release

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp target/dx/kopuz/release/linux/app/kopuz AppDir/usr/bin/kopuz
          cp data/com.temidaradev.kopuz.desktop AppDir/usr/share/applications/
          cp kopuz/assets/logo.png AppDir/usr/share/icons/hicolor/256x256/apps/com.temidaradev.kopuz.png

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

      - name: Build AppImage
        env:
          ARCH: x86_64
          GTK_THEME: Adwaita
          DEPLOY_GTK_VERSION: 3
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --exclude-library "libwebkit2gtk*" \
            --exclude-library "libjavascriptcoregtk*" \
            --output appimage

      - name: Rename AppImage
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mv kopuz-*.AppImage "kopuz_${VERSION}_x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kopuz-appimage-${{ github.ref_name }}
          path: kopuz_*.AppImage

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: kopuz_*.AppImage
